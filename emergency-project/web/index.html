<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>แจ้งเหตุฉุกเฉิน</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { font-family: Arial; padding: 20px; }
#map { height: 300px; margin-top: 10px; }
input, select, button, textarea {
  margin: 5px 0;
  padding: 10px;
  width: 100%;
}
</style>
</head>

<body>

<h2>🚨 แจ้งเหตุฉุกเฉิน</h2>

<select id="type">
  <option value="อุบัติเหตุ">อุบัติเหตุ</option>
  <option value="ไฟไหม้">ไฟไหม้</option>
  <option value="คนหมดสติ">คนหมดสติ</option>
  <option value="อื่นๆ">อื่นๆ</option>
</select>

<select id="gender">
  <option value="ชาย">ชาย</option>
  <option value="หญิง">หญิง</option>
  <option value="ไม่ระบุ">ไม่ระบุ</option>
</select>

<input type="number" id="age" placeholder="อายุ">
<textarea id="detail" placeholder="รายละเอียดเหตุการณ์" rows="4"></textarea>
<input type="file" id="image" accept="image/*">

<button onclick="getLocation()">📍 เรียกพิกัด</button>
<div id="map"></div>

<button onclick="sendReport()">🚨 แจ้งเหตุ</button>

<script>

const SERVER_URL = "https://2569.onrender.com";

let lat = null;
let lng = null;
let map;
let marker;

/* 📍 พิกัด */
function getLocation(){
  navigator.geolocation.getCurrentPosition((pos)=>{

    lat = pos.coords.latitude;
    lng = pos.coords.longitude;

    if(!map){
      map = L.map('map').setView([lat,lng],16);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    } else {
      map.setView([lat,lng],16);
    }

    if(marker) map.removeLayer(marker);

    marker = L.marker([lat,lng])
      .addTo(map)
      .bindPopup("ตำแหน่งของคุณ")
      .openPopup();

  });
}

/* base64 */
function getImageBase64(file){
  return new Promise((resolve)=>{
    const reader = new FileReader();
    reader.onload = ()=>resolve(reader.result);
    reader.readAsDataURL(file);
  });
}

/* 🚨 ส่งข้อมูล */
async function sendReport(){

  if(!lat || !lng){
    alert("กรุณากดเรียกพิกัดก่อน");
    return;
  }

  const file = document.getElementById("image").files[0];
  let imageData = null;

  if(file){
    imageData = await getImageBase64(file);
  }

  const data = {
    type: document.getElementById("type").value,
    gender: document.getElementById("gender").value,
    age: document.getElementById("age").value,
    detail: document.getElementById("detail").value,
    image: imageData,
    lat,
    lng
  };

  try {

    const res = await fetch(`${SERVER_URL}/api/report`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if(result.success){

      localStorage.setItem("reportId", result.id);

      /* ✅ FIX สำคัญ (ใช้ full origin) */
      window.location.href = `${window.location.origin}/pending.html`;

    } else {
      alert("ส่งข้อมูลไม่สำเร็จ");
    }

  } catch(err){
    console.log(err);
    alert("เชื่อมต่อ server ไม่ได้");
  }
}

</script>

</body>
</html>
